name: Build and Publish Delta Activities

on:
  push:
    branches: [ main ] # รันอัตโนมัติเมื่อ Push ขึ้น main

jobs:
  build_and_publish:
    runs-on: windows-latest # สำคัญ! ต้องใช้ Windows เพราะเราเขียน .NET Framework
    permissions: # เพิ่มส่วนนี้เข้าไป
      contents: read
      packages: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1
      with:
        nuget-version: 'latest'

    - name: Restore NuGet Packages
      run: nuget restore "Delta Utilities Activities.sln" -ConfigFile NuGet.Config

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1

    - name: Restore NuGet Packages
      run: nuget restore "Delta Utilities Activities.sln"

    - name: Build Solution
      run: msbuild "Delta Utilities Activities.sln" /p:Configuration=Release

    - name: Pack Activity
      # สั่งให้มัน Pack แล้วเอาไฟล์มาวางไว้ที่ "หน้าบ้าน" (Root) เลย หาง่ายแน่นอน!
      run: dotnet pack "Delta Utilities Activities.csproj" --configuration Release --output .

    - name: Pack Activity
      # สั่งให้วางไฟล์ไว้ที่ปัจจุบันที่แกยืนอยู่เลย (.)
      run: dotnet pack "Delta Utilities Activities.csproj" --configuration Release --output .

    - name: Deploy to Orchestrator
      uses: uipath/uipath-automation-package-action@v4
      with:
        # ใช้ API Key ตัวเดิมที่ Joe มี
        orchestrator_url: 'https://cloud.uipath.com/deltafmclgjf/DefaultTenant/'
        api_key: ${{ secrets.UIPATH_API_KEY }}
        # ระบุไฟล์ .nupkg ที่เรา Pack ไว้ (ถ้าใช้ท่า dotnet pack . ไฟล์จะอยู่หน้าบ้าน)
        package_path: '.' 
        # ไม่ต้องใส่ folder_name เพื่อให้มันเข้า Tenant Libraries

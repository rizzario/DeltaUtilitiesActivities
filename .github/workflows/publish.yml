name: Build and Publish Delta Activities

on:
  push:
    branches: [ main ] # รันอัตโนมัติเมื่อ Push ขึ้น main

jobs:
  build_and_publish:
    runs-on: windows-latest # สำคัญ! ต้องใช้ Windows เพราะเราเขียน .NET Framework
    permissions: # เพิ่มส่วนนี้เข้าไป
      contents: read
      packages: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1
      with:
        nuget-version: 'latest'

    - name: Restore NuGet Packages
      run: nuget restore "Delta Utilities Activities.sln" -ConfigFile NuGet.Config

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1

    - name: Restore NuGet Packages
      run: nuget restore "Delta Utilities Activities.sln"

    - name: Build Solution
      run: msbuild "Delta Utilities Activities.sln" /p:Configuration=Release

    - name: Pack Activity
      # สั่งให้มัน Pack แล้วเอาไฟล์มาวางไว้ที่ "หน้าบ้าน" (Root) เลย หาง่ายแน่นอน!
      run: dotnet pack "Delta Utilities Activities.csproj" --configuration Release --output .

    - name: Publish to GitHub Packages
      shell: pwsh
      run: |
        # 1. ลงทะเบียน GitHub เป็นแหล่งเก็บ NuGet (Source)
        dotnet nuget add source --username "${{ github.actor }}" --password "${{ secrets.GITHUB_TOKEN }}" --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
        
        # 2. Push ไฟล์ขึ้นไป (ใช้ GITHUB_TOKEN ที่มีให้ฟรีๆ อยู่แล้ว)
        dotnet nuget push "out/*.nupkg" --api-key "${{ secrets.GITHUB_TOKEN }}" --source "github" --skip-duplicate

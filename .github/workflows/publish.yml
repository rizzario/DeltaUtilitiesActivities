name: Build and Publish Delta Activities

on:
  push:
    branches: [ main ] # รันอัตโนมัติเมื่อ Push ขึ้น main

jobs:
  build_and_publish:
    runs-on: windows-latest # สำคัญ! ต้องใช้ Windows เพราะเราเขียน .NET Framework

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1
      with:
        nuget-version: 'latest'

    - name: Restore NuGet Packages
      run: nuget restore "Delta Utilities Activities.sln" -ConfigFile NuGet.Config

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1

    - name: Restore NuGet Packages
      run: nuget restore "Delta Utilities Activities.sln"

    - name: Build Solution
      run: msbuild "Delta Utilities Activities.sln" /p:Configuration=Release

    - name: Pack Activity (Create .nupkg)
      # 1. ใช้เทคนิค '|| $true' เพื่อให้มันข้าม Error ถ้ามีโฟลเดอร์อยู่แล้ว
      # 2. ใช้ Wildcard แบบเจาะจงที่หน้าไฟล์ .csproj เลย
      run: |
        if (!(Test-Path "bin/Release")) { New-Item -ItemType Directory -Path "bin/Release" }
        nuget pack **/*.csproj -Properties Configuration=Release -OutputDirectory bin/Release

    - name: Publish to UiPath Orchestrator
      # ส่งไฟล์ขึ้น Cloud Feed
      run: |
        nuget push bin\Release\*.nupkg ${{ secrets.UIPATH_API_KEY }} -Source "https://cloud.uipath.com/deltafmclgjf/DefaultTenant/orchestrator_/nuget/v3/feed" -SkipDuplicate

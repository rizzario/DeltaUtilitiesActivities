name: Build and Publish Delta Activities

on:
  push:
    branches: [ main ] # รันอัตโนมัติเมื่อ Push ขึ้น main

jobs:
  build_and_publish:
    runs-on: windows-latest # สำคัญ! ต้องใช้ Windows เพราะเราเขียน .NET Framework

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1
      with:
        nuget-version: 'latest'

    - name: Restore NuGet Packages
      run: nuget restore "Delta Utilities Activities.sln" -ConfigFile NuGet.Config

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1

    - name: Restore NuGet Packages
      run: nuget restore "Delta Utilities Activities.sln"

    - name: Build Solution
      run: msbuild "Delta Utilities Activities.sln" /p:Configuration=Release

    - name: Pack Activity (Create .nupkg)
      # เปลี่ยนมาใช้ dotnet pack แทน
      run: dotnet pack "Delta Utilities Activities.csproj" --configuration Release --output bin/Release

    - name: Publish to UiPath Orchestrator
      # ใช้ท่าไม้ตาย PowerShell ดึงชื่อไฟล์ออกมาตรงๆ กันพลาดเรื่องชื่อเวอร์ชัน
      shell: pwsh
      run: |
        $packageFile = Get-ChildItem -Path "./out/*.nupkg" | Select-Object -First 1 -ExpandProperty FullName
        Write-Host "Publishing package: $packageFile"
        dotnet nuget push "$packageFile" --api-key "${{ secrets.UIPATH_API_KEY }}" --source "https://cloud.uipath.com/deltafmclgjf/DefaultTenant/orchestrator_/nuget/v3/feed" --skip-duplicate

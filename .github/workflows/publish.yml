name: Build and Publish Delta Activities

on:
  push:
    branches: [ main ] # รันอัตโนมัติเมื่อ Push ขึ้น main

jobs:
  build_and_publish:
    runs-on: windows-latest # สำคัญ! ต้องใช้ Windows เพราะเราเขียน .NET Framework
    permissions: # เพิ่มส่วนนี้เข้าไป
      contents: read
      packages: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1
      with:
        nuget-version: 'latest'

    - name: Restore NuGet Packages
      run: nuget restore "Delta Utilities Activities.sln" -ConfigFile NuGet.Config

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1

    - name: Restore NuGet Packages
      run: nuget restore "Delta Utilities Activities.sln"

    - name: Build Solution
      run: msbuild "Delta Utilities Activities.sln" /p:Configuration=Release

    - name: Pack Activity
      # สั่งให้มัน Pack แล้วเอาไฟล์มาวางไว้ที่ "หน้าบ้าน" (Root) เลย หาง่ายแน่นอน!
      run: dotnet pack "Delta Utilities Activities.csproj" --configuration Release --output .

    - name: Pack Activity
      # สั่งให้วางไฟล์ไว้ที่ปัจจุบันที่แกยืนอยู่เลย (.)
      run: dotnet pack "Delta Utilities Activities.csproj" --configuration Release --output .

    - name: Publish to GitHub Packages
      shell: pwsh
      run: |
        # 1. เพิ่ม Source (ถ้ามีอยู่แล้วมันจะแจ้งเตือนเฉยๆ ไม่เป็นไร)
        dotnet nuget add source --username "${{ github.actor }}" --password "${{ secrets.GITHUB_TOKEN }}" --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --configfile nuget.config || $true
        
        # 2. ชี้ไปที่ไฟล์ .nupkg ที่อยู่ใน Root เลย
        dotnet nuget push "*.nupkg" --api-key "${{ secrets.GITHUB_TOKEN }}" --source "github" --skip-duplicate
        
    - name: Install UiPath CLI
      run: dotnet tool install --global UiPath.CLI

    - name: Deploy to Orchestrator
      shell: pwsh
      run: |
        # ใช้คำสั่ง uipath pack และ deploy ตรงๆ
        # ท่านี้มันจะหาทางเข้าบ้านให้เองโดยใช้แค่ URL หน้าบ้านครับ
        uipath deploy `
          --url "https://cloud.uipath.com/deltafmclgjf/DefaultTenant/" `
          --apiKey "${{ secrets.UIPATH_API_KEY }}" `
          --itemPath "out" `
          --tenant "DefaultTenant"
